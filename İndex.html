<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayırlı Bayramlar</title>
    <!-- Gelişmiş altın yaldız/konfeti efekti için -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Şık ve geleneksel fontlar -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Cormorant+Garamond:ital,wght@0,500;1,600&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f2b1d 0%, #1e4530 50%, #0d1e15 100%);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
        }

        /* Arka planda parlayan sabit yıldızlar */
        .stars-bg {
            position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255,215,0,0.1) 2%, transparent 10%),
                radial-gradient(circle at 85% 30%, rgba(255,215,0,0.1) 2%, transparent 10%);
        }

        /* Ana Kart Taşıyıcısı */
        .card-container {
            position: relative;
            width: 90vw; max-width: 500px;
            height: 60vh; max-height: 400px;
            perspective: 1000px;
            z-index: 5;
        }

        /* İÇERİK - Açıldığında görünen beyaz asıl kart */
        .inner-message {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #FDFBF7;
            border-radius: 8px;
            border: 2px solid #D4AF37;
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.2), 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; box-sizing: border-box;
            text-align: center;
            opacity: 0; transform: scale(0.9); transition: all 1s ease-in-out;
        }
        .card-container.open .inner-message {
            opacity: 1; transform: scale(1);
        }

        .inner-message h1 {
            font-family: 'Cinzel', serif;
            color: #0f2b1d; font-size: 26px; border-bottom: 2px solid #D4AF37; padding-bottom: 10px; margin-top: 0;
        }

        .inner-message p {
            color: #222; font-size: 22px; line-height: 1.6; margin: 20px 0; font-weight: 500;
        }
        .inner-message .signature {
            font-style: italic; color: #8c7323; font-size: 24px; margin-top: 20px; font-weight: 600;
        }

        /* ÇİFT KAPI / KAPAK Tasarımı */
        .gate {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/arabesque.png'), #183e29;
            border: 4px solid #D4AF37; box-sizing: border-box;
            transition: transform 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        .gate-left {
            left: 0; border-radius: 8px 0 0 8px; border-right: 2px solid #a6841d; transform-origin: left;
        }
        .gate-right {
            right: 0; border-radius: 0 8px 8px 0; border-left: 2px solid #a6841d; transform-origin: right;
        }
        
        .gate::after { /* Kapı Kulpları / Motifleri */
            content: '❁'; color: #D4AF37; font-size: 40px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .click-text-container {
            position: absolute; bottom: 10%; width: 100%; text-align: center;
            font-family: 'Cinzel', serif; color: #FFD700; z-index: 12; pointer-events: none;
            text-shadow: 1px 1px 10px rgba(255, 215, 0, 0.5); font-size: 18px;
            animation: breathe 2s infinite alternate; transition: opacity 0.5s;
        }

        /* Tıklandığında kapıların yana/geriye doğru açılması */
        .card-container.open .gate-left {
            transform: rotateY(-105deg); opacity: 0; box-shadow: none; pointer-events: none;
        }
        .card-container.open .gate-right {
            transform: rotateY(105deg); opacity: 0; box-shadow: none; pointer-events: none;
        }
        .card-container.open .click-text-container {
            opacity: 0;
        }

        @keyframes breathe { from { opacity: 0.6; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }

    </style>
</head>
<body>
    <div class="stars-bg"></div>

    <div class="card-container" id="myCard" onclick="openGreeting()">
        
        <!-- Yüzeyde görünen sol ve sağ kapak -->
        <div class="gate gate-left"></div>
        <div class="gate gate-right"></div>
        
        <div class="click-text-container" id="instruction-text">
            Bayram Mesajı<br>(Kapağa Dokun)
        </div>

        <!-- İÇERİDE ÇIKACAK OLAN KART VE METİNLER -->
        <div class="inner-message">
            <h1>Hayırlı Bayramlar</h1>
            
            <p>
                Ramazan Bayramınız mübarek olsun.<br><br>
                Sevdiklerinizle birlikte sağlık, huzur ve neşe içinde geçireceğiniz; kalplerin sevgiyle, sofraların bereketle dolduğu nice güzel bayramlar dilerim.
            </p>

            <!-- ADINI ALT SATIRA YAZ -->
            <div class="signature">Ahmet</div>
        </div>
    </div>

    <script>
        let isOpened = false;

        function openGreeting() {
            if (isOpened) return; // Birden fazla kez çalışmasını önler
            isOpened = true;

            const card = document.getElementById('myCard');
            card.classList.add('open');

            // Asil bir konfeti patlaması (Altın, Gümüş renklerde ve yıldızlar şeklinde)
            const duration = 2.5 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 45,
                    origin: { x: 0 },
                    colors: ['#D4AF37', '#FFD700', '#DAA520', '#C0C0C0']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 45,
                    origin: { x: 1 },
                    colors: ['#D4AF37', '#FFD700', '#DAA520', '#C0C0C0']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                } else {
                    confetti({
                        particleCount: 50,
                        spread: 100,
                        origin: { y: 0 },
                        gravity: 0.2,
                        ticks: 300,
                        colors: ['#D4AF37', '#FFDF00']
                    });
                }
            }());
        }
    </script>
</body>
</html>
